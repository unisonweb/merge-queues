name: Shared Check (Reusable Workflow)

on:
  workflow_call:
    inputs:
      token:
        description: "The word to look for in the latest PR comment"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Find PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          echo "Branch: $BRANCH"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            PR_NUMBER=$(echo "$GITHUB_HEAD_REF" | grep -oP 'pr-\K[0-9]+')
          else
            PR_NUMBER=$(gh pr list --head "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi

          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR found for branch $BRANCH"
            exit 1
          fi
          echo "PR number: $PR_NUMBER"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
      - name: Check latest comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT=$(gh pr view ${{ steps.pr.outputs.number }} --repo "$GITHUB_REPOSITORY" --json comments --jq '.comments[-1].body')
          echo "Latest comment: $COMMENT"

          if echo "$COMMENT" | grep -qw "${{ inputs.token }}"; then
            echo "Check passed ('${{ inputs.token }}' found in latest PR comment)"
          else
            echo "Check failed ('${{ inputs.token }}' not found in latest PR comment)"
            exit 1
          fi
